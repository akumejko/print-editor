# fly.toml app configuration file generated for print-editor on 2026-06-14T08:14:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'print-editor'
primary_region = 'arn'

[build]

[env]
  PORT = "8080"

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
